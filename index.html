<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Muppet Homepage</title>
</head>
<body>
    <header>
        <!-- Navigation Bar -->
        <nav>
        <div class="navbar">
            <a href="#" class="active">
                <h1>Muppet Homepage</h1>
            </a>

            <a href="movie_media.html" alternate="Waldorf">
                <img src="images/waldorf.jpg">
                <p>Movie Info</p>
            </a>

            <a href="characters.html" alternate="Stadler">
                <img src="images/statler.jpg">
                <p>Character Info</p>
            </a>                
        </div>
        </nav>
    </header>

    <button onclick="toggleElement('wow')">Start the show!</button>
    <!-- hide div at first -->
    <div id="wow" style="display: none">
        <h3>WHAT'S UP SHILOH NATION</h3>
    </div>
    <br>

    <script>
        // function to toggle an element's visibility
        function toggleElement(div) {
            let elem = document.getElementById(div)

            if (elem.style.display === "none") {
                elem.style.display = "block";
            } else {
                elem.style.display = "none";
            }
        }
    </script>

    <footer>
        <p>We did not create the Muppets. This is probably fine under fair use. - Hannah & Jes</p>
    </footer>

</body>
</html>
